[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "documind"
version = "0.2.1"
description = "DocuMind SDK - lightweight AI document generation for PPTX, DOCX, Markdown, XLSX, and HWPX"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{name = "DocuMind Team"}]
keywords = ["ai", "document-generation", "pptx", "docx", "xlsx", "markdown", "hwpx"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business",
    "Topic :: Software Development :: Libraries",
]

dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "langgraph>=1.2.1",
    "langchain-core>=1.2.0",
    "langchain-openai>=1.2.2",
    "langchain-aws>=1.5.0",
    "langchain-anthropic>=0.2",
    "langchain-google-genai>=2.0",
    "langchain-google-vertexai>=2.0",
    "openai>=1.30",
    "anthropic>=0.30",
    "boto3>=1.34",
    "httpx>=0.27",
    "tiktoken>=0.7",
    "python-pptx>=1.0",
    "lxml>=6.1.0",
    "Pillow>=12.2.0",
    "tinycss2>=1.3",
    "beautifulsoup4>=4.12",
    "html5lib>=1.1",
    "markdown-it-py>=4.0",
    "uuid6>=2024.1",
    "structlog>=24.1",
]

[project.optional-dependencies]
anthropic = []
azure = []
bedrock = []
gcp-vertex = []
gemini = []
image-bedrock = []
all-providers = []
dev = ["pytest>=9.0.3", "ruff>=0.4", "mypy>=1.10", "build>=1.2", "twine>=5.0"]

[project.urls]
Homepage = "https://github.com/bespin/documind"
Documentation = "https://github.com/bespin/documind/tree/main/packages/documind#readme"
Repository = "https://github.com/bespin/documind"

[tool.setuptools.packages.find]
where = ["src"]
include = ["documind", "src*"]
exclude = ["src.api*"]

[tool.setuptools.package-data]
"src.agents" = ["configs/*.json", "prompts/*.md"]
"src.formats.pptx.agents" = ["configs/*.json", "prompts/*.md"]
"src.formats.pptx.rulesets" = [
    "schemas/*.json",
    "presets/*.json",
    "presets/slide_types/*.json",
]
"src.formats.hwp" = ["assets/*.hwpx"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
